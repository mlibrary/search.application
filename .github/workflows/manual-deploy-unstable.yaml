name: Manual Deploy Unstable
on:
  workflow_dispatch:
    inputs:
      tag:
        description: tag
        required: true
jobs:
  build-unstable:
    name: Build unstable ${{ github.event.inputs.tag }}
    uses: mlibrary/platform-engineering-workflows/.github/workflows/build-unstable.yml@24f3c20c73e4fe79718b09071bcd858d09be269b #v1.6.5
    with:
      image_name: ${{ vars.IMAGE_NAME }}
      tag: ${{ github.event.inputs.tag }}
      dockerfile: Dockerfile
    secrets: inherit
  deploy-unstable:
    needs: build-unstable
    name: Deploy to workshop
    uses: mlibrary/platform-engineering-workflows/.github/workflows/deploy.yml@24f3c20c73e4fe79718b09071bcd858d09be269b #v1.6.5
    with:
      image: ${{ needs.build-unstable.outputs.image }}
      file: environments/application/workshop/web-image.txt
    secrets: inherit
