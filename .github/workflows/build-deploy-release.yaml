name: Docker Tag Latest Release
on:
  release:
    types: [released]
jobs:
  build-production:
    name: Build production ${{ github.event.release.tag_name }}
    uses: mlibrary/platform-engineering-workflows/.github/workflows/build-production.yml@3da26f1832553b70524d212b48ec21b0d206006e #v1.6.6
    with:
      image_name: ${{ vars.IMAGE_NAME }}
      tag: ${{ github.event.release.tag_name }}
      dockerfile: Dockerfile
    secrets: inherit
  deploy-production:
    needs: build-production
    name: Deploy to production
    uses: mlibrary/platform-engineering-workflows/.github/workflows/deploy.yml@3da26f1832553b70524d212b48ec21b0d206006e #v1.6.6
    with:
      image: ghcr.io/mlibrary/${{ vars.IMAGE_NAME }}:${{ github.event.release.tag_name }}
      file: environments/application/production/web-image.txt
    secrets: inherit
