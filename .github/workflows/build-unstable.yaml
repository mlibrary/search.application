name: Build unstable image
on:
  workflow_dispatch:
    inputs:
      tag:
        description: tag
        required: true
jobs:
  build-unstable:
    uses: mlibrary/platform-engineering-workflows/.github/workflows/build-unstable.yml@3da26f1832553b70524d212b48ec21b0d206006e #v1.6.6
    with:
      image_name: ${{ vars.IMAGE_NAME }}
      tag: ${{ github.event.inputs.tag }}
      dockerfile: Dockerfile
    secrets: inherit
