name: Build unstable image
on:
  workflow_dispatch:
    inputs:
      tag:
        description: tag
        required: true
jobs:
  build-unstable:
    uses: mlibrary/platform-engineering-workflows/.github/workflows/build-unstable.yml@24f3c20c73e4fe79718b09071bcd858d09be269b #v1.6.5
    with:
      image_name: ${{ vars.IMAGE_NAME }}
      tag: ${{ github.event.inputs.tag }}
      dockerfile: Dockerfile
    secrets: inherit
